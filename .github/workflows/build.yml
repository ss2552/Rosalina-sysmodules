name: Make

on:
  workflow_dispatch:
    
jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm
    steps:
      - uses: actions/checkout@v4
      - name: キャッシュの復元
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: build
          key: rosalina
      - name: libc.so.6
        run: sudo apt install libc6 -y
      - name: make
        run: make
      - uses: actions/upload-artifact@v4
        with:
          name: out
          path: ./
            
      - name: 依存関係のインストール
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: npm ci
      - name: キャッシュの保存
        uses: actions/cache@v4
        with:
          path: build
          key: rosalina
